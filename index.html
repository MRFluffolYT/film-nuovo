<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRFluffolFilm</title>
  <meta
    name="description"
    content="MRFluffolFilm: film e serie TV in streaming con ricerca rapida e player ottimizzato."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />

  <script
    defer
    src="https://cloud.umami.is/script.js"
    data-website-id="94b892f6-ccbe-4a8a-9488-65774e908597"
  ></script>
  <script defer src="script.js"></script>
</head>
<body>
  <div id="username-modal" class="modal-shell">
    <div class="modal-card">
      <h2>Accesso</h2>
      <p>Inserisci il tuo username per continuare.</p>

      <label class="modal-input-wrap" for="username-input">
        <span>Username</span>
        <input
          type="text"
          id="username-input"
          placeholder="Il tuo nome"
          autocomplete="off"
          maxlength="30"
        />
      </label>

      <div id="browser-tip" class="browser-tip" hidden>
        Se il player ti apre popup o pubblicita, prova con Brave.
      </div>

      <button id="username-submit" class="primary-button" disabled>
        Entra
      </button>
    </div>
  </div>

  <div id="details-panel" class="details-shell" hidden>
    <div class="details-backdrop"></div>
    <div class="details-panel">
      <button id="detailsCloseBtn" class="details-close" type="button" aria-label="Chiudi">
        &times;
      </button>

      <div class="details-media">
        <div id="detailsVisual" class="details-visual"></div>
        <div class="details-poster-wrap">
          <img id="detailsPoster" class="details-poster" alt="" />
        </div>
      </div>

      <div class="details-copy">
        <span id="detailsType" class="pill">Film</span>
        <h2 id="detailsTitle">Titolo</h2>
        <div id="detailsMeta" class="hero-meta"></div>
        <p id="detailsDescription" class="details-description"></p>
        <p id="detailsCast" class="details-cast"></p>

        <div class="details-actions">
          <button id="detailsWatchBtn" class="primary-button" type="button">
            Guarda ora
          </button>
          <button id="detailsCancelBtn" class="ghost-button" type="button">
            Chiudi
          </button>
        </div>
      </div>
    </div>
  </div>

  <header class="topbar">
    <a id="homeLink" href="#featured" class="brand" aria-label="Home MRFluffolFilm">
      <span class="brand-mark">MF</span>
      <span class="brand-copy">MRFluffolFilm</span>
    </a>

    <div class="search-bar">
      <input
        type="text"
        id="searchInput"
        placeholder="Cerca film o serie TV"
        autocomplete="off"
      />
      <button id="searchBtn" class="primary-button" type="button">Cerca</button>
    </div>
  </header>

  <main class="page-shell">
    <section id="featured" class="featured">
      <div id="heroBackdrop" class="featured-backdrop"></div>
      <div class="featured-overlay"></div>

      <div class="featured-content">
        <span id="heroType" class="pill">Film</span>
        <h1 id="heroTitle">MRFluffolFilm</h1>
        <div id="heroMeta" class="hero-meta"></div>
        <p id="heroDescription" class="featured-description"></p>

        <div class="featured-actions">
          <button id="heroPlayBtn" class="primary-button" type="button">
            Guarda
          </button>
          <button id="surpriseBtn" class="ghost-button" type="button">
            Casuale
          </button>
        </div>
      </div>
    </section>

    <div id="home-sections" class="home-sections">
      <section class="content-section">
        <div class="section-head">
          <h2>In tendenza</h2>
        </div>
        <div id="trendingRail" class="media-rail"></div>
      </section>

      <section id="popular-section" class="content-section">
        <div class="section-head">
          <h2>Film</h2>
        </div>
        <div id="popularRail" class="media-rail"></div>
      </section>

      <section class="content-section">
        <div class="section-head">
          <h2>Serie</h2>
        </div>
        <div id="seriesRail" class="media-rail"></div>
      </section>

      <section class="content-section">
        <div class="section-head">
          <h2>Top rated</h2>
        </div>
        <div id="topRatedRail" class="media-rail"></div>
      </section>
    </div>

    <section id="results-section" class="content-section" hidden>
      <div class="section-head">
        <h2>Risultati</h2>
        <span id="resultsSummary" class="section-meta"></span>
      </div>

      <div id="results" class="results-grid"></div>
    </section>

    <section id="watch-area" class="content-section watch-section" hidden>
      <div class="section-head section-head-player">
        <div>
          <h2 id="playerTitle">Player</h2>
          <p id="playerSubtitle" class="section-meta"></p>
        </div>

        <div id="downloadContainer" class="download-container">
          <a
            id="downloadLink"
            class="ghost-button"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
          >
            Apri fuori
          </a>
        </div>
      </div>

      <div id="tvControls" class="tv-controls">
        <label for="seasonSelect">
          Stagione
          <select id="seasonSelect"></select>
        </label>

        <label for="episodeSelect">
          Episodio
          <select id="episodeSelect"></select>
        </label>
      </div>

      <div class="player-frame-wrap">
        <iframe
          id="playerFrame"
          title="Player video"
          loading="lazy"
          referrerpolicy="no-referrer"
          allow="fullscreen; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>
    </section>
  </main>
</body>
</html>
